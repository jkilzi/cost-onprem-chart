{{- if .Values.rbac.bootstrapAdmin.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cost-onprem.rbac.adminBootstrap.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac-admin-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "cost-onprem.labels" . | nindent 8 }}
        app.kubernetes.io/component: rbac-admin-bootstrap
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false

      securityContext:
        {{- include "cost-onprem.securityContext.pod" . | nindent 8 }}

      containers:
      - name: bootstrap-admin
        image: "{{ include "cost-onprem.rbac.image" . }}"
        imagePullPolicy: {{ .Values.rbac.image.pullPolicy }}
        workingDir: /opt/rbac/rbac

        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            DB_HOST="{{ include "cost-onprem.rbac.database.host" . }}"
            DB_PORT="{{ .Values.database.server.port | default "5432" }}"
            MAX_WAIT=300
            ELAPSED=0

            BOOTSTRAP_USERNAME="{{ .Values.rbac.bootstrapAdmin.username }}"
            BOOTSTRAP_ORG_ID="{{ .Values.rbac.bootstrapAdmin.orgId }}"
            BOOTSTRAP_ACCOUNT_NUMBER="{{ .Values.rbac.bootstrapAdmin.accountNumber }}"

            echo "=== insights-rbac admin bootstrap job ==="
            echo "Username: ${BOOTSTRAP_USERNAME}"
            echo "Org ID: ${BOOTSTRAP_ORG_ID}"
            echo "Account Number: ${BOOTSTRAP_ACCOUNT_NUMBER}"

            echo "Waiting for PostgreSQL at ${DB_HOST}:${DB_PORT}..."
            while ! timeout 5 bash -c "cat < /dev/null > /dev/tcp/${DB_HOST}/${DB_PORT}" 2>/dev/null; do
              if [ $ELAPSED -ge $MAX_WAIT ]; then
                echo "ERROR: PostgreSQL not ready after ${MAX_WAIT} seconds"
                exit 1
              fi
              echo "PostgreSQL not ready (${ELAPSED}s elapsed), waiting..."
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            echo "✓ PostgreSQL is ready (waited ${ELAPSED}s)"

            echo "Creating Tenant, Principal, Group, and Policy for admin user..."
            python manage.py shell <<BOOTSTRAP_SCRIPT
            from api.models import Tenant
            from management.models import Group, Policy, Role, Principal
            from django.core.cache import cache

            username = "${BOOTSTRAP_USERNAME}"
            org_id = "${BOOTSTRAP_ORG_ID}"
            acct_number = "${BOOTSTRAP_ACCOUNT_NUMBER}"

            public_tenant = Tenant.objects.get(tenant_name='public')
            admin_default_roles = Role.objects.filter(admin_default=True, tenant=public_tenant)
            if not admin_default_roles.exists():
                print("ERROR: No admin_default roles found — migration job may not have completed")
                raise SystemExit(1)

            tenant, created = Tenant.objects.get_or_create(
                org_id=org_id,
                defaults={'tenant_name': 'acct' + acct_number, 'ready': True}
            )
            if created:
                print(f"Created tenant for org_id={org_id}")
            else:
                print(f"Tenant for org_id={org_id} already exists")

            grp, _ = Group.objects.get_or_create(
                name='Cost Admin Default', tenant=tenant,
                defaults={'admin_default': True, 'system': True,
                          'description': 'Admin default: grants admin_default roles to bootstrap admin user'}
            )
            grp.admin_default = True
            grp.save()

            policy, _ = Policy.objects.get_or_create(
                name='Cost Admin Default Policy', tenant=tenant, group=grp
            )
            for role in admin_default_roles:
                policy.roles.add(role)

            principal, _ = Principal.objects.get_or_create(
                username=username, tenant=tenant,
                defaults={'type': 'user'}
            )
            grp.principals.add(principal)

            role_names = list(admin_default_roles.values_list('name', flat=True))
            cache.clear()
            print(f"✓ User '{username}' granted {role_names} for org={org_id}")
            BOOTSTRAP_SCRIPT
            echo "✓ Admin user bootstrap complete"

            echo "Running bootstrap_tenants for TenantMapping/V2 records..."
            set +e
            python manage.py bootstrap_tenants --org-id "${BOOTSTRAP_ORG_ID}" --force
            bootstrap_rc=$?
            set -e
            if [ $bootstrap_rc -ne 0 ]; then
              echo "WARNING: bootstrap_tenants exited with code $bootstrap_rc (non-fatal)"
            fi
            echo "✓ Tenant bootstrap complete"

            echo "=== insights-rbac admin bootstrap job completed ==="

        env:
        {{- include "cost-onprem.rbac.commonEnv" . | nindent 8 }}

        securityContext:
          {{- include "cost-onprem.securityContext.container" . | nindent 10 }}

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
{{- end }}
