{{- if .Values.rbac.keycloakSync.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cost-onprem.rbac.keycloakSync.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac-keycloak-sync
data:
  sync_keycloak_principals.py: |
    {{- .Files.Get "scripts/sync_keycloak_principals.py" | nindent 4 }}
{{- end }}
