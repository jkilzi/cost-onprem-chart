# Runs deploy-test-cost-onprem.sh --dry-run with every flag permutation
# and asserts the summary output matches expected mode, deploy, and test states.

name: Validate deploy-test-cost-onprem.sh Script

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/deploy-test-cost-onprem.sh'
      - 'scripts/setup-test-data.sh'
      - '.github/workflows/validate-deploy-test-script.yml'
  workflow_dispatch:

jobs:
  validate-flags:
    name: Validate flag permutations
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all flag permutations
        run: |
          SCRIPT="scripts/deploy-test-cost-onprem.sh"
          failures=0
          passed=0

          # assert_output OUTPUT PATTERN LABEL
          assert_output() {
            local output="$1" pattern="$2" label="$3"
            if echo "$output" | grep -qF "$pattern"; then
              echo "    ✓ ${label}"
            else
              echo "    ✗ ${label} — expected '${pattern}'"
              return 1
            fi
          }

          # run_case NAME FLAGS EXPECT_MODE EXPECT_DEPLOY EXPECT_CHART EXPECT_PERF EXPECT_IQE
          run_case() {
            local name="$1" flags="$2" expect_mode="$3"
            local expect_deploy="$4" expect_chart="$5" expect_perf="$6" expect_iqe="$7"
            local case_failures=0

            echo ""
            echo "━━━ ${name} ━━━"

            local output exit_code
            set +e
            output=$(bash "$SCRIPT" --dry-run $flags 2>&1)
            exit_code=$?
            set -e

            if [ "$exit_code" -ne 0 ]; then
              echo "    ✗ Script exited with code ${exit_code}"
              echo "$output" | tail -5
              failures=$((failures + 1))
              return
            fi

            # Mode
            assert_output "$output" "Mode: ${expect_mode}" "Mode: ${expect_mode}" \
              || case_failures=$((case_failures + 1))

            # Deploy steps
            local deploy_enabled=(
              "✓ Deploy Red Hat Build of Keycloak"
              "✓ Deploy Kafka/AMQ Streams"
              "✓ Deploy Cost On-Prem Helm Chart"
              "✓ Setup TLS Certificates"
            )
            local deploy_skipped=(
              "✗ Deploy RHBK (SKIPPED)"
              "✗ Deploy Kafka/AMQ Streams (SKIPPED)"
              "✗ Deploy Cost On-Prem Helm Chart (SKIPPED)"
              "✗ Setup TLS Certificates (SKIPPED)"
            )
            for i in "${!deploy_enabled[@]}"; do
              if [ "$expect_deploy" = "true" ]; then
                assert_output "$output" "${deploy_enabled[$i]}" "${deploy_enabled[$i]#✓ }" \
                  || case_failures=$((case_failures + 1))
              else
                assert_output "$output" "${deploy_skipped[$i]}" "${deploy_skipped[$i]#✗ }" \
                  || case_failures=$((case_failures + 1))
              fi
            done

            # Chart tests
            if [ "$expect_chart" = "true" ]; then
              assert_output "$output" "✓ Run Chart Tests" "Chart tests enabled" \
                || case_failures=$((case_failures + 1))
            else
              assert_output "$output" "✗ Run Chart Tests (SKIPPED)" "Chart tests skipped" \
                || case_failures=$((case_failures + 1))
            fi

            # Performance tests
            if [ "$expect_perf" = "true" ]; then
              assert_output "$output" "✓ Run Performance Tests" "Performance tests enabled" \
                || case_failures=$((case_failures + 1))
            else
              assert_output "$output" "✗ Run Performance Tests (OPTIONAL)" "Performance tests not requested" \
                || case_failures=$((case_failures + 1))
            fi

            # IQE tests
            if [ "$expect_iqe" = "true" ]; then
              assert_output "$output" "✓ Run IQE Tests" "IQE tests enabled" \
                || case_failures=$((case_failures + 1))
            else
              assert_output "$output" "✗ Run IQE Tests (OPTIONAL)" "IQE tests not requested" \
                || case_failures=$((case_failures + 1))
            fi

            if [ "$case_failures" -gt 0 ]; then
              failures=$((failures + 1))
            else
              passed=$((passed + 1))
            fi
          }

          # run_error_case NAME FLAGS EXPECTED_ERROR
          run_error_case() {
            local name="$1" flags="$2" expected_error="$3"

            echo ""
            echo "━━━ ${name} (expect error) ━━━"

            local output exit_code
            set +e
            output=$(bash "$SCRIPT" --dry-run $flags 2>&1)
            exit_code=$?
            set -e

            if [ "$exit_code" -eq 0 ]; then
              echo "    ✗ Expected error but script succeeded"
              failures=$((failures + 1))
              return
            fi

            if echo "$output" | grep -qF "$expected_error"; then
              echo "    ✓ Got expected error: ${expected_error}"
              passed=$((passed + 1))
            else
              echo "    ✗ Wrong error message — expected '${expected_error}'"
              echo "    Got: $(echo "$output" | tail -3)"
              failures=$((failures + 1))
            fi
          }

          #                NAME                                        FLAGS                                      MODE                    DEPLOY  CHART  PERF   IQE
          run_case         "(defaults)"                                ""                                         "Full deployment"       true    true   false  false
          run_case         "--run-iqe"                                 "--run-iqe"                                "Full deployment"       true    true   false  true
          run_case         "--skip-chart-tests"                        "--skip-chart-tests"                       "Full deployment"       true    false  false  false
          run_case         "--skip-chart-tests --run-iqe"              "--skip-chart-tests --run-iqe"             "Full deployment"       true    false  false  true
          run_case         "--skip-deploy"                             "--skip-deploy"                            "Tests-only"            false   true   false  false
          run_case         "--skip-deploy --run-iqe"                   "--skip-deploy --run-iqe"                  "Tests-only"            false   true   false  true
          run_case         "--iqe-only"                                "--iqe-only"                               "IQE-only"              false   false  false  true
          run_case         "--tests-only (alias)"                      "--tests-only"                             "Tests-only"            false   true   false  false
          run_case         "--skip-test (alias)"                       "--skip-test"                              "Full deployment"       true    false  false  false
          run_case         "--tests-only --skip-test --run-iqe"        "--tests-only --skip-test --run-iqe"       "IQE-only"              false   false  false  true
          run_case         "--perf-only"                               "--perf-only"                              "Performance-only"      false   false  true   false
          run_case         "--perf-only --perf-profile small"          "--perf-only --perf-profile small"         "Performance-only"      false   false  true   false
          run_case         "--perf-only --perf-profile medium"         "--perf-only --perf-profile medium"        "Performance-only"      false   false  true   false
          run_case         "--perf-only --perf-profile large"          "--perf-only --perf-profile large"         "Performance-only"      false   false  true   false

          # Chart version flags
          run_case         "--devel"                                   "--devel"                                  "Full deployment"       true    true   false  false
          run_case         "--chart-version 0.2.19"                    "--chart-version 0.2.19"                   "Full deployment"       true    true   false  false
          run_case         "--devel --chart-version 0.2.20-rc1"        "--devel --chart-version 0.2.20-rc1"       "Full deployment"       true    true   false  false

          # Invalid flag combinations (should fail)
          run_error_case   "--use-local-chart --devel"                 "--use-local-chart --devel"                "Cannot use --devel with --use-local-chart"
          run_error_case   "--use-local-chart --chart-version 0.2.19"  "--use-local-chart --chart-version 0.2.19" "Cannot use --chart-version with --use-local-chart"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Results: ${passed} passed, ${failures} failed"

          [ "$failures" -eq 0 ] || exit 1
