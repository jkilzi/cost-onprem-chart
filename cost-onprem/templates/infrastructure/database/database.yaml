{{- if .Values.database.deploy }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cost-onprem.fullname" . }}-database
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    # Deploy database before migrations run (pre-install hook)
    # No delete policy - database persists and remains managed by Helm
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  serviceName: {{ include "cost-onprem.fullname" . }}-database
  replicas: 1
  selector:
    matchLabels:
      {{- include "cost-onprem.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "cost-onprem.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "cost-onprem.securityContext.pod.nonRoot" . | nindent 8 }}
      containers:
        - name: postgres
          image: "{{ .Values.database.server.image.repository }}:{{ .Values.database.server.image.tag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.database.server.port }}
              protocol: TCP
          env:
            # registry.redhat.io/rhel*/postgresql-* (sclorg): requires POSTGRESQL_ADMIN_PASSWORD
            # or POSTGRESQL_USER+POSTGRESQL_PASSWORD+POSTGRESQL_DATABASE. Admin password path
            # matches bundled init (superuser role is "postgres").
            - name: POSTGRESQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: postgres-password
            # Used by init script and probes (must be the PostgreSQL superuser name, typically "postgres")
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: postgres-user
            # Service users/passwords for bundled init script (sourced from postgresql-init dir)
            - name: ROS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: ros-user
            - name: ROS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: ros-password
            - name: KRUIZE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: kruize-user
            - name: KRUIZE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: kruize-password
            - name: KOKU_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: koku-user
            - name: KOKU_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: koku-password
            - name: RBAC_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: rbac-user
            - name: RBAC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem.database.defaultSecretName" . }}
                  key: rbac-password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/pgsql/data
            - name: init-scripts
              mountPath: /opt/app-root/src/postgresql-init
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          securityContext:
            {{- include "cost-onprem.securityContext.container" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.database | nindent 12 }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "cost-onprem.fullname" . }}-db-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        volumeMode: {{ include "cost-onprem.storage.volumeMode" . }}
        storageClassName: {{ include "cost-onprem.storage.databaseClass" . }}
        resources:
          requests:
            storage: {{ .Values.database.server.storage.size }}
{{- end }}
